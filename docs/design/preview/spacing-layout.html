<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 20px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); color: var(--fg-1); }
  .frame { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--r-md); padding: 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; height: 240px; }
  .panel { background: var(--bg-2); border: 1px solid var(--border-1); border-radius: var(--r-md); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .panel .h { font: 500 var(--t-2xs)/1 var(--font-sans); color: var(--fg-3); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .panel .v { font: 600 24px/1 var(--font-mono); }
  .legend { display: flex; gap: 16px; margin-top: 14px; font-size: var(--t-xs); color: var(--fg-3); }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend i { width: 8px; height: 8px; border-radius: 2px; background: var(--accent); display: inline-block; }
  h4 { margin: 0 0 14px; color: var(--fg-3); font: 500 var(--t-2xs)/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
</style></head>
<body>
<h4>layout · 2×2 panel grid · 16 gap · 20 panel pad</h4>
<div class="frame">
  <div class="grid">
    <div class="panel"><span class="h">calculator</span><span class="v">size 0.142</span></div>
    <div class="panel"><span class="h">positions</span><span class="v">3 open</span></div>
    <div class="panel"><span class="h">spot</span><span class="v">$128,402</span></div>
    <div class="panel"><span class="h">allocation</span><span class="v">62 / 28 / 10</span></div>
  </div>
  <div class="legend"><span><i></i>gap 16</span><span><i style="background:var(--profit)"></i>panel-pad 20</span><span><i style="background:var(--warn)"></i>row-h 36</span></div>
</div>
</body></html>
