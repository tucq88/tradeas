<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 24px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); color: var(--fg-1); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .lab { width: 80px; font: 500 var(--t-2xs)/1 var(--font-sans); color: var(--fg-3); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .btn { font: 500 var(--t-sm)/1 var(--font-sans); height: 32px; padding: 0 14px; border-radius: var(--r-sm); border: 1px solid var(--border-1); background: var(--bg-2); color: var(--fg-1); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: var(--bg-3); }
  .btn.primary { background: var(--accent); color: #07252b; border-color: transparent; font-weight: 600; }
  .btn.primary:hover { background: var(--accent-hi); }
  .btn.long { background: var(--profit-bg); color: var(--profit); border-color: transparent; font-weight: 600; }
  .btn.short { background: var(--loss-bg); color: var(--loss); border-color: transparent; font-weight: 600; }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--fg-2); }
  .btn.ghost:hover { background: var(--bg-2); color: var(--fg-1); }
  .btn.disabled { opacity: 0.4; cursor: not-allowed; }
</style></head>
<body>
<div class="stack">
  <div class="row"><div class="lab">primary</div><button class="btn primary">place order</button><button class="btn primary">save</button></div>
  <div class="row"><div class="lab">side</div><button class="btn long">↑ long</button><button class="btn short">↓ short</button></div>
  <div class="row"><div class="lab">secondary</div><button class="btn">cancel</button><button class="btn">edit</button><button class="btn ghost">close all</button></div>
  <div class="row"><div class="lab">disabled</div><button class="btn primary disabled">placing…</button><button class="btn disabled">cancel</button></div>
</div>
</body></html>
