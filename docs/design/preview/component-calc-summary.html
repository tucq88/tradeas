<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 22px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); color: var(--fg-1); }
  .panel { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--r-md); padding: 18px; }
  .lab { font: 500 var(--t-2xs)/1 var(--font-sans); color: var(--fg-3); letter-spacing: var(--tracking-caps); text-transform: uppercase; margin-bottom: 12px; display: block; }
  .hero { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .hero .k { font: 500 12px/1 var(--font-sans); color: var(--fg-3); }
  .hero .rr { font: 600 28px/1 var(--font-mono); font-variant-numeric: tabular-nums; color: var(--accent); letter-spacing: -0.02em; }
  .hero .colon { color: var(--fg-3); font: 400 22px/1 var(--font-mono); }
  .hero .tag { margin-left: auto; font: 500 11px/1 var(--font-sans); padding: 4px 8px; border-radius: 999px; background: var(--accent-bg); color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid var(--border-1); }
  .cell { padding: 10px 14px 0 0; display: flex; flex-direction: column; gap: 4px; padding-top: 12px; }
  .cell + .cell { border-left: 1px solid var(--border-1); padding-left: 14px; padding-right: 0; }
  .cell .k { font: 500 10px/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-3); }
  .cell .v { font: 500 14px/1 var(--font-mono); font-variant-numeric: tabular-nums; color: var(--fg-1); }
  .cell .v.warn { color: var(--warn); }
</style></head>
<body>
<div class="panel">
  <span class="lab">trade calculator · summary strip</span>
  <div class="hero">
    <span class="k">risk : reward</span>
    <span class="rr">1</span><span class="colon">:</span><span class="rr">2.4</span>
    <span class="tag">acceptable</span>
  </div>
  <div class="grid">
    <div class="cell"><span class="k">size</span><span class="v">0.184 BTC</span></div>
    <div class="cell"><span class="k">notional</span><span class="v">$12,037.00</span></div>
    <div class="cell"><span class="k">margin</span><span class="v">$2,407.40</span></div>
    <div class="cell"><span class="k">est. fee</span><span class="v">$8.42</span></div>
  </div>
</div>
</body></html>
