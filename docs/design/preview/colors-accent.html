<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 20px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); color: var(--fg-1); }
  .row { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 12px; }
  .card { border-radius: var(--r-md); border: 1px solid var(--border-1); overflow: hidden; }
  .lg { padding: 20px; background: #11203a; color: #5b9dff; display: flex; flex-direction: column; gap: 6px; }
  .lg .l { font-size: var(--t-2xs); letter-spacing: var(--tracking-caps); text-transform: uppercase; opacity: 0.75; color: #5b9dff; }
  .lg .h { font: 600 var(--t-3xl)/1 var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .meta { padding: 8px 10px; background: var(--bg-1); display: flex; justify-content: space-between; font-size: var(--t-xs); }
  .meta .hex { font-family: var(--font-mono); color: var(--fg-3); }
  .small { padding: 14px; display: flex; flex-direction: column; gap: 4px; }
  .small .l { font-size: var(--t-2xs); letter-spacing: var(--tracking-caps); text-transform: uppercase; opacity: 0.75; }
  .small .h { font: 600 var(--t-lg)/1 var(--font-mono); font-variant-numeric: tabular-nums; }
  h4 { margin: 0 0 10px; color: var(--fg-3); font: 500 var(--t-2xs)/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
</style></head>
<body>
<h4>accent · cool blue · used sparingly · focus, active tab, links</h4>
<div class="row">
  <div class="card">
    <div class="lg"><span class="l">accent · primary</span><span class="h">5b9dff</span></div>
    <div class="meta"><span>--accent</span><span class="hex">#5B9DFF</span></div>
  </div>
  <div class="card">
    <div class="small" style="background:#82b6ff;color:#08152a;"><span class="l">accent-hi · hover</span><span class="h">82b6ff</span></div>
    <div class="meta"><span>--accent-hi</span><span class="hex">#82B6FF</span></div>
  </div>
  <div class="card">
    <div class="small" style="background:#2f6dc4;color:#e6eaf0;"><span class="l">accent-dim · pressed</span><span class="h">2f6dc4</span></div>
    <div class="meta"><span>--accent-dim</span><span class="hex">#2F6DC4</span></div>
  </div>
</div>
</body></html>
