<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 20px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); color: var(--fg-1); }
  .panel { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--r-md); padding: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .lab { font: 500 var(--t-2xs)/1 var(--font-sans); color: var(--fg-3); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .input { display: flex; align-items: center; gap: 8px; background: var(--bg-inset); border: 1px solid var(--border-1); border-radius: var(--r-sm); padding: 0 10px; height: 34px; }
  .input.focus { border-color: var(--border-emph); box-shadow: 0 0 0 2px rgba(76,194,214,0.35); }
  .input input { background: transparent; border: 0; outline: 0; color: var(--fg-1); flex: 1; font: 500 var(--t-md)/1 var(--font-mono); font-variant-numeric: tabular-nums; }
  .input .suffix { color: var(--fg-3); font: 500 var(--t-xs)/1 var(--font-mono); }
  .computed { font: 500 var(--t-xs)/1 var(--font-mono); color: var(--fg-2); margin-top: 2px; }
  .computed strong { color: var(--accent); font-weight: 500; }
</style></head>
<body>
<div class="panel">
  <div class="group">
    <span class="lab">entry</span>
    <div class="input"><input value="64,210.00"><span class="suffix">USD</span></div>
    <span class="computed">≈ <strong>0.142 BTC</strong></span>
  </div>
  <div class="group">
    <span class="lab">stop</span>
    <div class="input focus"><input value="62,840.00"><span class="suffix">USD</span></div>
    <span class="computed">risk <strong>2.1%</strong> · −$84.40</span>
  </div>
  <div class="group">
    <span class="lab">size</span>
    <div class="input"><input value="0.142"><span class="suffix">BTC</span></div>
    <span class="computed">notional <strong>$9,118.22</strong></span>
  </div>
  <div class="group">
    <span class="lab">leverage</span>
    <div class="input"><input value="5"><span class="suffix">×</span></div>
    <span class="computed">liq <strong>58,210.0</strong></span>
  </div>
</div>
</body></html>
