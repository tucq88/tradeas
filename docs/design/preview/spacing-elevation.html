<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 24px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); color: var(--fg-1); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .card { background: var(--bg-1); border-radius: var(--r-md); padding: 16px; min-height: 80px; display: flex; flex-direction: column; gap: 10px; justify-content: space-between; }
  .lab .n { font: 500 var(--t-2xs)/1 var(--font-sans); color: var(--fg-3); letter-spacing: var(--tracking-caps); text-transform: uppercase; display: block; }
  .lab .v { font: 500 var(--t-xs)/1.4 var(--font-mono); color: var(--fg-2); margin-top: 4px; }
  .e1 { box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 1px 2px rgba(0,0,0,0.4); border: 1px solid var(--border-1); }
  .e2 { box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 4px 16px rgba(0,0,0,0.45); border: 1px solid var(--border-1); }
  .ef { box-shadow: 0 0 0 2px rgba(76,194,214,0.35); border: 1px solid var(--border-emph); }
  h4 { margin: 0 0 14px; color: var(--fg-3); font: 500 var(--t-2xs)/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
</style></head>
<body>
<h4>elevation · used sparingly · cards stay flat</h4>
<div class="row">
  <div class="card e1"><span class="lab"><span class="n">shadow-1</span><span class="v">subtle · row hover, popover</span></span></div>
  <div class="card e2"><span class="lab"><span class="n">shadow-2</span><span class="v">menu, tooltip, modal</span></span></div>
  <div class="card ef"><span class="lab"><span class="n">shadow-focus</span><span class="v">2px accent ring</span></span></div>
</div>
</body></html>
