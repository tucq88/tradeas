<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 24px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); color: var(--fg-1); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .lab { font: 500 var(--t-2xs)/1 var(--font-sans); color: var(--fg-3); letter-spacing: var(--tracking-caps); text-transform: uppercase; margin-bottom: 8px; display: block; }
  /* segmented (like shadcn tabs) */
  .seg { display: inline-flex; padding: 3px; background: var(--bg-2); border: 1px solid var(--border-1); border-radius: var(--r-sm); gap: 2px; }
  .seg button { background: transparent; border: 0; color: var(--fg-2); font: 500 var(--t-sm)/1 var(--font-sans); padding: 0 12px; height: 28px; border-radius: 4px; cursor: pointer; }
  .seg button.active { background: var(--bg-1); color: var(--fg-1); box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 1px rgba(0,0,0,0.4); }
  /* underline (like dashboard top tabs) */
  .ul { display: flex; gap: 18px; border-bottom: 1px solid var(--border-1); }
  .ul a { color: var(--fg-2); text-decoration: none; padding: 0 0 10px; font: 500 var(--t-md)/1 var(--font-sans); position: relative; }
  .ul a.active { color: var(--fg-1); }
  .ul a.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: var(--accent); }
</style></head>
<body>
<div class="stack">
  <div>
    <span class="lab">segmented · calculator modes</span>
    <div class="seg">
      <button class="active">size</button><button>risk</button><button>r:r</button><button>liq</button>
    </div>
  </div>
  <div>
    <span class="lab">underline · panel nav</span>
    <div class="ul">
      <a class="active">positions</a><a>spot</a><a>history</a><a>alerts</a>
    </div>
  </div>
</div>
</body></html>
