<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 20px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stack { display: flex; flex-direction: column; gap: 4px; }
  .chip { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: var(--r-sm); border: 1px solid var(--border-1); }
  .chip .name { font-size: var(--t-xs); }
  .chip .hex { font-family: var(--font-mono); font-size: var(--t-2xs); opacity: 0.85; }
  h4 { margin: 0 0 10px; color: var(--fg-3); font: 500 var(--t-2xs)/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
</style></head>
<body>
<h4>foreground ramp · text on bg-1</h4>
<div class="row">
  <div class="stack">
    <div class="chip" style="background:#0f1318;color:#e6eaf0;"><span class="name">fg-1 primary</span><span class="hex">#E6EAF0</span></div>
    <div class="chip" style="background:#0f1318;color:#a8b0bd;"><span class="name">fg-2 secondary</span><span class="hex">#A8B0BD</span></div>
    <div class="chip" style="background:#0f1318;color:#6b7480;"><span class="name">fg-3 tertiary</span><span class="hex">#6B7480</span></div>
    <div class="chip" style="background:#0f1318;color:#444c57;"><span class="name">fg-4 disabled</span><span class="hex">#444C57</span></div>
  </div>
  <div class="stack" style="grid-column: span 3;">
    <div class="chip" style="background:#0f1318;border-color:#1f2730;color:#a8b0bd;"><span class="name">border-1 hairline</span><span class="hex">#1F2730</span></div>
    <div class="chip" style="background:#0f1318;border-color:#2a3340;color:#a8b0bd;"><span class="name">border-2 stronger</span><span class="hex">#2A3340</span></div>
    <div class="chip" style="background:#0f1318;border-color:#3a4554;color:#a8b0bd;"><span class="name">border-emph focus</span><span class="hex">#3A4554</span></div>
    <div class="chip" style="background:#070a0d;border-color:#1f2730;color:#a8b0bd;"><span class="name">bg-inset · input</span><span class="hex">#070A0D</span></div>
  </div>
</div>
</body></html>
