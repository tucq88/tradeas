<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 24px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); color: var(--fg-1); }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; align-items: stretch; }
  .panel { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--r-md); padding: 18px; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; justify-content: center; }
  .wm { font: 600 28px/1 var(--font-sans); letter-spacing: -0.02em; color: var(--fg-1); }
  .wm .dot { color: var(--accent); }
  .wm .dim { color: var(--fg-3); }
  .lab { font: 500 var(--t-2xs)/1 var(--font-sans); color: var(--fg-3); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .meta { font: 500 var(--t-xs)/1.4 var(--font-mono); color: var(--fg-2); }
  .mark { width: 56px; height: 56px; border-radius: var(--r-md); background: var(--bg-inset); border: 1px solid var(--border-1); display: flex; align-items: center; justify-content: center; }
  .mark svg { display: block; }
</style></head>
<body>
<div class="row">
  <div class="panel">
    <span class="lab">wordmark</span>
    <div class="wm">tu<span class="dot">.</span>tradeas</div>
    <span class="meta">geist 600 · −0.02 em</span>
  </div>
  <div class="panel">
    <span class="lab">monogram</span>
    <div class="mark">
      <svg viewBox="0 0 32 32" width="40" height="40">
        <circle cx="16" cy="16" r="3.2" fill="#5b9dff"/>
        <path d="M5 22 L11 16 L16 19 L22 12 L27 14" stroke="#2ecc71" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="meta">favicon · 32×32</span>
  </div>
  <div class="panel">
    <span class="lab">on bg-2</span>
    <div style="background:var(--bg-2); padding: 12px 14px; border-radius: var(--r-sm); width: 100%;">
      <div class="wm" style="font-size:20px;">tu<span class="dot">.</span>tradeas</div>
    </div>
    <span class="meta">always lowercase · never italic</span>
  </div>
</div>
</body></html>
