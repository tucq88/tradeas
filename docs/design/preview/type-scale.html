<!doctype html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); }
  body { padding: 20px; width: 700px; box-sizing: border-box; font-family: var(--font-sans); color: var(--fg-1); }
  .grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; align-items: end; }
  .step { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--r-sm); padding: 10px 6px 8px; text-align: center; }
  .step .n { font: 500 var(--t-2xs)/1 var(--font-sans); color: var(--fg-3); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .step .px { font: 500 var(--t-xs)/1 var(--font-mono); color: var(--fg-2); margin-top: 4px; }
  .step .demo { font-family: var(--font-sans); color: var(--fg-1); margin-top: 8px; }
  h4 { margin: 0 0 12px; color: var(--fg-3); font: 500 var(--t-2xs)/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
</style></head>
<body>
<h4>scale · 10 → 44 px · compact, dashboard-tuned</h4>
<div class="grid">
  <div class="step"><div class="n">2xs</div><div class="px">10</div><div class="demo" style="font-size:10px;">Aa</div></div>
  <div class="step"><div class="n">xs</div><div class="px">11</div><div class="demo" style="font-size:11px;">Aa</div></div>
  <div class="step"><div class="n">sm</div><div class="px">12</div><div class="demo" style="font-size:12px;">Aa</div></div>
  <div class="step"><div class="n">md</div><div class="px">13</div><div class="demo" style="font-size:13px;">Aa</div></div>
  <div class="step"><div class="n">lg</div><div class="px">15</div><div class="demo" style="font-size:15px;">Aa</div></div>
  <div class="step"><div class="n">xl</div><div class="px">18</div><div class="demo" style="font-size:18px;">Aa</div></div>
  <div class="step"><div class="n">2xl</div><div class="px">24</div><div class="demo" style="font-size:24px;">Aa</div></div>
  <div class="step"><div class="n">3xl</div><div class="px">32</div><div class="demo" style="font-size:32px;">Aa</div></div>
  <div class="step"><div class="n">4xl</div><div class="px">44</div><div class="demo" style="font-size:44px;">Aa</div></div>
</div>
</body></html>
